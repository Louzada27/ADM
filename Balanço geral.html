<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Balanço Patrimonial</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
}

.card{
margin-bottom:15px;
}

input{
font-size:14px;
}

</style>

</head>

<body>

<div class="container mt-4">

<h3 class="text-center mb-4">Balanço Patrimonial</h3>

<div class="row">

<!-- ATIVO -->

<div class="col-md-4">

<h5 class="text-center">ATIVO</h5>

<div class="card p-3">

<h6>Ativo Circulante</h6>

<div id="ativo_circulante"></div>

<button class="btn btn-sm btn-success mt-2" onclick="addCampo('ativo_circulante')">
+ Conta
</button>

</div>


<div class="card p-3">

<h6>Ativo Não Circulante</h6>

<div id="ativo_nao_circulante"></div>

<button class="btn btn-sm btn-success mt-2" onclick="addCampo('ativo_nao_circulante')">
+ Conta
</button>

</div>

</div>



<!-- PASSIVO -->

<div class="col-md-4">

<h5 class="text-center">PASSIVO</h5>

<div class="card p-3">

<h6>Passivo Circulante</h6>

<div id="passivo_circulante"></div>

<button class="btn btn-sm btn-success mt-2" onclick="addCampo('passivo_circulante')">
+ Conta
</button>

</div>



<div class="card p-3">

<h6>Passivo Não Circulante</h6>

<div id="passivo_nao_circulante"></div>

<button class="btn btn-sm btn-success mt-2" onclick="addCampo('passivo_nao_circulante')">
+ Conta
</button>

</div>

</div>



<!-- PATRIMONIO -->

<div class="col-md-4">

<h5 class="text-center">PATRIMÔNIO LÍQUIDO</h5>

<div class="card p-3">

<h6>Patrimônio Líquido</h6>

<div id="patrimonio"></div>

<button class="btn btn-sm btn-success mt-2" onclick="addCampo('patrimonio')">
+ Conta
</button>

</div>

</div>

</div>


<div class="text-center mt-4 mb-5">

<button class="btn btn-primary px-4 py-2" onclick="calcularBalanco()">
Calcular Balanço
</button>

</div>

</div>



<!-- MODAL RESULTADO -->

<div class="modal fade" id="resultadoModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">Resultado do Balanço</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<pre id="resultado"></pre>

</div>

<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">
Fechar
</button>

</div>

</div>

</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>



<script>

function addCampo(secao){

let container = document.getElementById(secao)

let div = document.createElement("div")

div.className = "row mb-2"

div.innerHTML = `

<div class="col-7">
<input type="text" class="form-control nome" placeholder="Conta">
</div>

<div class="col-5">
<input type="number" step="any" class="form-control valor" placeholder="Valor">
</div>

`

container.appendChild(div)

}



function somar(secao){

let total = 0

let valores = document.querySelectorAll(`#${secao} .valor`)

valores.forEach(v => {

let n = parseFloat(v.value)

if(!isNaN(n)){

total += n

}

})

return total

}



function calcularBalanco(){

let ativo_c = somar("ativo_circulante")
let ativo_nc = somar("ativo_nao_circulante")

let passivo_c = somar("passivo_circulante")
let passivo_nc = somar("passivo_nao_circulante")

let patrimonio = somar("patrimonio")

let total_ativo = ativo_c + ativo_nc

let total_passivo = passivo_c + passivo_nc + patrimonio

let f = v => v.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})


let resultado = `

ATIVO
Ativo Circulante:       ${f(ativo_c)}
Ativo Não Circulante:   ${f(ativo_nc)}

TOTAL ATIVO:            ${f(total_ativo)}


PASSIVO
Passivo Circulante:     ${f(passivo_c)}
Passivo Não Circulante: ${f(passivo_nc)}

PATRIMÔNIO LÍQUIDO
Patrimônio Líquido:     ${f(patrimonio)}

TOTAL PASSIVO + PL:     ${f(total_passivo)}

`


if(total_ativo === total_passivo){

resultado += "\n✅ Balanço FECHADO"

}else{

resultado += "\n❌ Balanço NÃO fecha"

}


document.getElementById("resultado").textContent = resultado

let modal = new bootstrap.Modal(document.getElementById("resultadoModal"))

modal.show()

}

</script>


</body>
</html>
